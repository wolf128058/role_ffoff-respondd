---
- name: Install packages
  become: yes
  apt:
    update_cache: yes
    cache_valid_time: 3600
    pkg:
      - git
      - python3-netifaces
      - python3-pip
    state: present

- name: Clone my respondd with git
  become: yes
  git:
    repo: 'https://github.com/freifunkMUC/ext-respondd'
    dest: /opt/ext-respondd/
    force: yes

- name: Copy systemd file
  become: yes
  copy:
    remote_src: yes
    src: /opt/ext-respondd/ext-respondd.service.example
    dest: /etc/systemd/system/ext-respondd.service
    owner: root
    group: root
    mode: u=rw,g=r,o=r

- name: Create welt directory
  become: yes
  template:
    src: 'templates/router_info.j2'
    dest: '/opt/ext-respondd/alias.json'
    owner: 'root'
    group: 'root'
    mode: 'u=rw,g=,o='

- name: Create respondd config
  become: yes
  template:
    src: 'templates/respondd.j2'
    dest: '/opt/ext-respondd/config.json'
    owner: 'root'
    group: 'root'
    mode: 'u=rw,g=,o='

- name: reload systemd and start respondd
  become: yes
  systemd:
    name: ext-respondd
    daemon_reload: yes
    enabled: yes
    state: restarted

- name: Create ext-respondd healthcheck
  become: yes
  template:
    src: 'templates/ext-respondd-healthcheck.py.j2'
    dest: '/usr/local/sbin/ext-respondd-healthcheck'
    owner: 'root'
    group: 'root'
    mode: 'u=rwx,g=rx,o=rx'
  when: respondd_healthcheck_enabled

- name: Cronjob checking if ext-respondd answers and restart it if needed
  become: yes
  cron:
    name: "Restart stuck ext-respondd"
    minute: "{{ respondd_healthcheck_interval }}"
    hour: "*"
    job: "/usr/local/sbin/ext-respondd-healthcheck"
  when: respondd_healthcheck_enabled
